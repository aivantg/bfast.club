server {
    listen 5000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(html)$ {
        add_header Cache-Control "no-store";
    }

    location ~* \.(css|js|png|jpg|ico|woff2?)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
